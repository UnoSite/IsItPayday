name: Code validation
permissions:
  contents: read

on:
  push:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - labeled
      - unlabeled
  schedule:
    - cron: "0 0 * * *"

jobs:
  validate-hassfest:
    name: Hassfest validation
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v7
      - name: validation
        uses: home-assistant/actions/hassfest@master

  validate-hacs:
    name: HACS validation
    runs-on: "ubuntu-latest"
    steps:
      - name: checkout
        uses: "actions/checkout@v7"
      - name: validation
        uses: "hacs/action@main"
        with:
          category: "integration"
